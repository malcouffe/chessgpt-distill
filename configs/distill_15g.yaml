# Stockfish distillation config for 15 GiB GPU (e.g. RTX 4060 Ti 16GB)
# Fine-tunes a pre-trained ChessGPT using KL-divergence on Stockfish soft targets.

pretrained_checkpoint: "malcouffe/chessgpt"  # REQUIRED: path to pre-trained ChessGPT checkpoint

model:
  d_model: 1280
  n_layers: 21
  n_heads: 20
  d_ff: 3584
  max_seq_len: 256
  dropout: 0.05

data:
  train_path: "malcouffe/chessgpt-sf-distill"
  val_ratio: 0.01
  batch_size: 16
  max_seq_len: 256
  num_workers: 2
  prefetch_factor: 2
  sf_temperature: 150.0
  seed: 42

optim:
  learning_rate: 1.0e-5
  weight_decay: 0.01
  betas: [0.9, 0.95]
  grad_clip: 1.0
  grad_accum_steps: 16  # effective batch = 16 * 16 = 256

schedule:
  warmup_steps: 500
  max_steps: 12000
  min_lr_ratio: 0.1

logging:
  log_every: 50
  eval_every: 500
  eval_steps: 100
  save_every: 2000
  checkpoint_dir: "checkpoints/distill"
  save_best: true

hub:
  push_to_hub: false
  repo_id: ""

use_amp: true
amp_dtype: "bf16"
compile: false
compile_mode: "default"
gradient_checkpointing: true
