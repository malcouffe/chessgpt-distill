# Stockfish distillation config for H100 (80GB VRAM)
# Fine-tunes a pre-trained ChessGPT using KL-divergence on Stockfish soft targets.

pretrained_checkpoint: "malcouffe/chessgpt"

model:
  d_model: 1280
  n_layers: 21
  n_heads: 20
  d_ff: 3584
  max_seq_len: 256
  dropout: 0.05

data:
  train_path: "malcouffe/chessgpt-sf-distill"
  val_ratio: 0.01
  batch_size: 256
  max_seq_len: 256
  num_workers: 4
  prefetch_factor: 4
  sf_temperature: 150.0
  seed: 42

optim:
  learning_rate: 1.0e-5
  weight_decay: 0.01
  betas: [0.9, 0.95]
  grad_clip: 1.0
  grad_accum_steps: 1

schedule:
  warmup_steps: 500
  max_steps: 12000
  min_lr_ratio: 0.1

logging:
  log_every: 50
  eval_every: 500
  eval_steps: 100
  save_every: 2000
  checkpoint_dir: "/tmp/checkpoints/distill"
  save_best: true

hub:
  push_to_hub: true
  repo_id: "malcouffe/chessgpt-distill"

use_amp: true
amp_dtype: "bf16"
compile: true
compile_mode: "default"
gradient_checkpointing: false
